apiVersion: apps/v1
kind: Deployment
metadata:
  name: muhasebe-web-app
  namespace: default
  labels:
    app: muhasebe-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: muhasebe-web
  template:
    metadata:
      labels:
        app: muhasebe-web
    spec:
      containers:
      - name: web-container
        image: mcr.microsoft.com/azuredocs/aci-helloworld:latest
        ports:
        - containerPort: 80
        env:
        - name: DATABASE_CONNECTION_STRING
          value: "Server=tcp:holding-prod-sqlserver-99.database.windows.net,1433;Database=ProdDB;User ID=sqladmin;Password=P@ssword123456!;Encrypt=true;TrustServerCertificate=false;Connection Timeout=30;"
---
apiVersion: v1
kind: Service
metadata:
  name: muhasebe-web-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: muhasebe-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: muhasebe-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: muhasebe-web-service
            port:
              number: 80