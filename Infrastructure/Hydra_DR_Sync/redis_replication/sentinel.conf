# Redis Sentinel Konfigürasyonu - Kurumsal DR Altyapısı
port 26379
daemonize no
pidfile /var/run/redis-sentinel.pid
logfile "/var/log/redis/sentinel.log"
dir /tmp

# 1. WestEurope'taki birincil Redis sunucusunu (Master) izle. 
# Sondaki '2', oylama için en az 2 Sentinel'in sunucunun çöktüğünü onaylaması gerektiğini belirtir (Quorum).
sentinel monitor redis-master 10.100.1.50 6379 2

# 2. Master sunucuya 5 saniye boyunca ulaşılamazsa çökmüş kabul et (Down-After-Milliseconds)
sentinel down-after-milliseconds redis-master 5000

# 3. Failover (Yeni Master seçme) sürecinin maksimum süresi (15 saniye)
sentinel failover-timeout redis-master 15000

# 4. Yeni Master seçildiğinde, diğer replikaların aynı anda kaç tanesinin senkronize olacağını belirle
sentinel parallel-syncs redis-master 1

# 5. Güvenlik ve Kimlik Doğrulama
sentinel auth-pass redis-master KurumsalSifre987!
